services:
  postgres:
    image: postgres:17
    container_name: my-bank-postgres
    environment:
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
      POSTGRES_DB: bankdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  zookeeper:
    image: zookeeper:3.9
    container_name: my-bank-zookeeper

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: my-bank-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/bankdb
      KC_DB_USERNAME: bankuser
      KC_DB_PASSWORD: bankpass
      KC_DB_SCHEMA: keycloak
      KC_HTTP_PORT: 8180
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./docker/my-bank-realm.json:/opt/keycloak/data/import/my-bank-realm.json
    depends_on:
      - postgres

  accounts-service:
    build:
      context: .
      dockerfile: accounts-service/Dockerfile
    container_name: my-bank-accounts
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankdb?currentSchema=accounts
      SPRING_CLOUD_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      SPRING_CLOUD_ZOOKEEPER_DISCOVERY_INSTANCE_HOST: accounts-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
    depends_on:
      - postgres
      - zookeeper
      - keycloak

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: my-bank-notifications
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankdb?currentSchema=notifications
      SPRING_CLOUD_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      SPRING_CLOUD_ZOOKEEPER_DISCOVERY_INSTANCE_HOST: notification-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
    depends_on:
      - postgres
      - zookeeper
      - keycloak

  cash-service:
    build:
      context: .
      dockerfile: cash-service/Dockerfile
    container_name: my-bank-cash
    environment:
      SPRING_CLOUD_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      SPRING_CLOUD_ZOOKEEPER_DISCOVERY_INSTANCE_HOST: cash-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_CASH_SERVICE_CLIENT_TOKEN_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/token
    depends_on:
      - zookeeper
      - accounts-service
      - notification-service
      - keycloak

  transfer-service:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    container_name: my-bank-transfer
    environment:
      SPRING_CLOUD_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      SPRING_CLOUD_ZOOKEEPER_DISCOVERY_INSTANCE_HOST: transfer-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_TRANSFER_SERVICE_CLIENT_TOKEN_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/token
    depends_on:
      - zookeeper
      - accounts-service
      - notification-service
      - keycloak

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: my-bank-gateway
    environment:
      SPRING_CLOUD_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      SPRING_CLOUD_ZOOKEEPER_DISCOVERY_INSTANCE_HOST: gateway-service
    depends_on:
      - zookeeper
      - accounts-service
      - cash-service
      - transfer-service

  front-ui:
    build:
      context: .
      dockerfile: front-ui/Dockerfile
    container_name: my-bank-front
    ports:
      - "8080:8080"
    environment:
      GATEWAY_URL: http://gateway-service:8081
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_USER_INFO_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/userinfo
    depends_on:
      - gateway-service
      - keycloak

volumes:
  postgres-data:
