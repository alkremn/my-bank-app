services:
  postgres:
    image: postgres:17
    container_name: my-bank-postgres
    environment:
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
      POSTGRES_DB: bankdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: my-bank-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/bankdb
      KC_DB_USERNAME: bankuser
      KC_DB_PASSWORD: bankpass
      KC_DB_SCHEMA: keycloak
      KC_HTTP_PORT: 8180
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./docker/my-bank-realm.json:/opt/keycloak/data/import/my-bank-realm.json
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:3.9.0
    container_name: my-bank-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  accounts-service:
    image: my-bank/accounts-service:latest
    build:
      context: .
      dockerfile: accounts-service/Dockerfile
    container_name: my-bank-accounts
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bankdb?currentSchema=accounts
      DB_USERNAME: bankuser
      DB_PASSWORD: bankpass
      KEYCLOAK_JWK_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_started
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy

  notification-service:
    image: my-bank/notification-service:latest
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: my-bank-notifications
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bankdb?currentSchema=notifications
      DB_USERNAME: bankuser
      DB_PASSWORD: bankpass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy

  cash-service:
    image: my-bank/cash-service:latest
    build:
      context: .
      dockerfile: cash-service/Dockerfile
    container_name: my-bank-cash
    environment:
      KEYCLOAK_JWK_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/token
      OAUTH2_CLIENT_ID: cash-service-client
      OAUTH2_CLIENT_SECRET: cash-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      accounts-service:
        condition: service_started
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started

  transfer-service:
    image: my-bank/transfer-service:latest
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    container_name: my-bank-transfer
    environment:
      KEYCLOAK_JWK_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/token
      OAUTH2_CLIENT_ID: transfer-service-client
      OAUTH2_CLIENT_SECRET: transfer-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      accounts-service:
        condition: service_started
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started

  front-ui:
    image: my-bank/front-ui:latest
    build:
      context: .
      dockerfile: front-ui/Dockerfile
    container_name: my-bank-front
    ports:
      - "8080:8080"
    environment:
      ACCOUNTS_SERVICE_URL: http://accounts-service:8082
      CASH_SERVICE_URL: http://cash-service:8083
      TRANSFER_SERVICE_URL: http://transfer-service:8084
      KEYCLOAK_AUTH_URI: http://localhost:8180/realms/my-bank/protocol/openid-connect/auth
      KEYCLOAK_TOKEN_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/token
      KEYCLOAK_JWK_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/certs
      KEYCLOAK_USERINFO_URI: http://keycloak:8180/realms/my-bank/protocol/openid-connect/userinfo
    depends_on:
      accounts-service:
        condition: service_started
      cash-service:
        condition: service_started
      transfer-service:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  postgres-data:
  kafka-data:
