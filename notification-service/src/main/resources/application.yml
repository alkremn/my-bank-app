spring:
  application:
    name: notification-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/my-bank/protocol/openid-connect/certs}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bankdb?currentSchema=notifications}
    username: ${DB_USERNAME:bankuser}
    password: ${DB_PASSWORD:bankpass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: notifications

my-bank:
  security:
    scope: notifications

server:
  port: 8085
