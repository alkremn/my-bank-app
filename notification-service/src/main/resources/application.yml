spring:
  application:
    name: notification-service
  cloud:
    zookeeper:
      connect-string: localhost:2181
      discovery:
        root: /services
      config:
        root: /config
  config:
    import: "optional:zookeeper:"
  datasource:
    url: jdbc:postgresql://localhost:5432/bankdb?currentSchema=notifications
    username: bankuser
    password: bankpass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: notifications

server:
  port: 8085
