spring:
  application:
    name: my-bank-front-app
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: front-ui-client
            client-secret: front-ui-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,accounts,cash,transfer,notifications
        provider:
          keycloak:
            authorization-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/auth
            token-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/token
            jwk-set-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/certs
            user-info-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

server:
  port: 8080

services:
  accounts:
    url: ${ACCOUNTS_SERVICE_URL:http://localhost:8082}
  cash:
    url: ${CASH_SERVICE_URL:http://localhost:8083}
  transfer:
    url: ${TRANSFER_SERVICE_URL:http://localhost:8084}

resilience4j:
  circuitbreaker:
    instances:
      accounts:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
      cash:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
      transfer:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
