apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.fullnameOverride }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.fullnameOverride }}
  template:
    metadata:
      labels:
        app: {{ .Values.fullnameOverride }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8180
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: {{ .Values.db.url | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.db.username | quote }}
            - name: KC_DB_PASSWORD
              value: {{ .Values.db.password | quote }}
            - name: KC_DB_SCHEMA
              value: {{ .Values.db.schema | quote }}
            - name: KC_HTTP_PORT
              value: "8180"
            - name: KC_HOSTNAME
              value: "http://localhost:{{ .Values.hostnamePort }}"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm
          configMap:
            name: {{ .Values.fullnameOverride }}-realm
