apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.fullnameOverride }}-netpol
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.fullnameOverride }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: accounts-service
        - podSelector:
            matchLabels:
              app: cash-service
        - podSelector:
            matchLabels:
              app: transfer-service
        - podSelector:
            matchLabels:
              app: notification-service
        - podSelector:
            matchLabels:
              app: kafka-topic-init
      ports:
        - protocol: TCP
          port: 9092
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
