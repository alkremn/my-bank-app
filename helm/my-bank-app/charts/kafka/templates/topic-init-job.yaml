apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.fullnameOverride }}-topic-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: {{ .Values.fullnameOverride }}-topic-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: topic-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server {{ .Values.fullnameOverride }}:9092 > /dev/null 2>&1; do
                sleep 2
              done
              echo "Kafka is ready. Creating topics..."
              /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
                --bootstrap-server {{ .Values.fullnameOverride }}:9092 \
                --topic notifications \
                --partitions 3 \
                --replication-factor 1
              echo "Topics created successfully."
