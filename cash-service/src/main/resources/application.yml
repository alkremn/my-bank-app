spring:
  application:
    name: cash-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/my-bank/protocol/openid-connect/certs}
      client:
        registration:
          cash-service-client:
            client-id: ${OAUTH2_CLIENT_ID:cash-service-client}
            client-secret: ${OAUTH2_CLIENT_SECRET:cash-secret}
            authorization-grant-type: client_credentials
            scope: accounts,notifications
        provider:
          cash-service-client:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/my-bank/protocol/openid-connect/token}

my-bank:
  security:
    scope: cash
  oauth2-client:
    registration-id: cash-service-client

server:
  port: 8083

resilience4j:
  circuitbreaker:
    instances:
      cash-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
