spring:
  application:
    name: accounts-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/my-bank/protocol/openid-connect/certs}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bankdb?currentSchema=accounts}
    username: ${DB_USERNAME:bankuser}
    password: ${DB_PASSWORD:bankpass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: accounts
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

my-bank:
  security:
    scope: accounts

server:
  port: 8082
