spring:
  application:
    name: transfer-service
  cloud:
    zookeeper:
      connect-string: localhost:2181
      discovery:
        root: /services
      config:
        root: /config
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/my-bank
      client:
        registration:
          transfer-service-client:
            client-id: transfer-service-client
            client-secret: transfer-secret
            authorization-grant-type: client_credentials
            scope: accounts,notifications
        provider:
          transfer-service-client:
            token-uri: http://localhost:8180/realms/my-bank/protocol/openid-connect/token
  config:
    import: "optional:zookeeper:"

server:
  port: 8084

resilience4j:
  circuitbreaker:
    instances:
      transfer-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
